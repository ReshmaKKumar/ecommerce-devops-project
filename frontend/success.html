<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful</title>

    <style>

        body{
            font-family:Arial;
            background:#f3f3f3;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .success-box{
            background:white;
            padding:40px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            color:green;
            margin-bottom:20px;
        }

        button{
            background:#ff9900;
            border:none;
            padding:12px 20px;
            border-radius:5px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#e68a00;
        }

    </style>

</head>
<body>

    <div class="success-box">

        <h1>✅ Order Placed Successfully!</h1>

        <p>
            Thank you for shopping with Amazon Clone.
        </p>

        <br>

        <button onclick="goHome()">
            Continue Shopping
        </button>

    </div>

    <script>

        function goHome(){

            window.location.href = "index.html";

        }

    </script>

</body>
</html>
