<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Login</title>

    <style>

        body{
            font-family:Arial;
            background:#f3f3f3;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            margin-bottom:20px;
            text-align:center;
            color:#ff9900;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#ff9900;
            border:none;
            border-radius:5px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#e68a00;
        }

    </style>

</head>
<body>

    <div class="login-box">

        <h1>amazon</h1>

        <input type="email" placeholder="Enter Email">

        <input type="password" placeholder="Enter Password">

        <button onclick="login()">
            Login
        </button>

    </div>

    <script>
function login(){

    localStorage.setItem("loggedIn", "true");

    alert("Login Successful");

    window.location.href = "index.html";
}
    </script>

</body>
</html>
