<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

body{
    font-family:Arial;
    background:#f3f3f3;
    padding:30px;
}

h1{
    margin-bottom:30px;
}

.dashboard{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card h2{
    font-size:40px;
    color:#ff9900;
    margin-top:10px;
}

</style>
</head>

<body>

<h1>Admin Dashboard 📊</h1>

<div class="dashboard">

    <div class="card">

        <h3>Total Orders</h3>

        <h2 id="ordersCount">0</h2>

    </div>

    <div class="card">

        <h3>Wishlist Items</h3>

        <h2 id="wishlistCount">0</h2>

    </div>

    <div class="card">

        <h3>Cart Items</h3>

        <h2 id="cartCount">0</h2>

    </div>

    <div class="card">

        <h3>Total Revenue</h3>

        <h2 id="revenue">₹0</h2>

    </div>

</div>

<script>

let orders =
JSON.parse(localStorage.getItem("orders")) || [];

let wishlist =
JSON.parse(localStorage.getItem("wishlist")) || [];

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("ordersCount")
.innerText = orders.length;

document.getElementById("wishlistCount")
.innerText = wishlist.length;

document.getElementById("cartCount")
.innerText = cart.length;

let totalRevenue = 0;

orders.forEach(item => {

    let price =
    Number(item.price.replace(/[^0-9]/g,""));

    totalRevenue +=
    price * (item.quantity || 1);
});

document.getElementById("revenue")
.innerText =
"₹" + totalRevenue.toLocaleString('en-IN');

</script>

</body>
</html>
