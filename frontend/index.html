<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store</title>

    <style>
        body{
            font-family: Arial;
            margin:0;
            padding:0;
            background:#f4f4f4;
        }

        header{
            background:#222;
            color:white;
            padding:15px;
            text-align:center;
        }

        .products{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:40px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            width:220px;
            text-align:center;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        button{
            background:green;
            color:white;
            border:none;
            padding:10px 15px;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:darkgreen;
        }
    </style>
</head>
<body>

    <header>
        <h1>My E-Commerce Store</h1>
    </header>

    <div class="products">

        <div class="card">
            <h2>Laptop</h2>
            <p>₹50000</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <h2>Phone</h2>
            <p>₹20000</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <h2>Headphones</h2>
            <p>₹3000</p>
            <button>Add to Cart</button>
        </div>

    </div>

</body>
</html>
