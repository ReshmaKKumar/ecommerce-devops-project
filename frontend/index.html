<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #eaeded;
        }

        /* Navbar */
        .navbar {
            background: #131921;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #ff9900;
        }

        .search-bar {
            width: 50%;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 18px;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
        }

        /* Banner */
        .banner {
            background: url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200') center/cover;
            height: 300px;
        }

        /* Categories */
        .categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            background: white;
            flex-wrap: wrap;
        }

        .categories button {
            padding: 10px 18px;
        }

        /* Products */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: contain;
            background: white;
            border-radius: 10px;
        }

        .card h3 {
            margin: 15px 0 10px;
        }

        .price {
            color: green;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .rating {
            color: #ff9900;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .card-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            background: #ff9900;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #e68a00;
        }

        /* Footer */
        footer {
            background: #131921;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 20px;
        }

        /* Dark Mode */
        .dark-mode {
            background: #1e1e1e;
            color: white;
        }

        .dark-mode .card,
        .dark-mode .categories,
        .dark-mode .modal-content {
            background: #2c2c2c;
            color: white;
        }

        .dark-mode footer {
            background: black;
        }

        .dark-mode input {
            background: #333;
            color: white;
        }

        .dark-mode .card img {
            background: #2c2c2c;
        }
        
        /* Fixed CSS Location from bottom of JS */
        .dark-mode #notificationPanel {
            background: #2c2c2c;
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 20px;
            width: 350px;
            border-radius: 10px;
            text-align: center;
            position: relative;
        }

        .modal-content img {
            width: 100%;
            height: 250px;
            object-fit: contain;
            border-radius: 10px;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            cursor: pointer;
        }

        /* Loader */
        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #ff9900;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media(max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
            }
            .search-bar {
                width: 90%;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }
            .products {
                grid-template-columns: 1fr;
            }
            .modal-content {
                width: 90%;
            }
            .banner {
                height: 180px;
            }
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #ddd;
            color: black; /* Ensure text is visible */
        }

        .suggestion-item:hover {
            background: #f3f3f3;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">

            <div>
    <a href="dashboard.html"
    style="color:white;text-decoration:none;">

        Dashboard 📊
    </a>
</div>


<div style="
background:#ff9900;
color:white;
text-align:center;
padding:10px;
font-weight:bold;
">

    CI/CD Deployment Successful 🚀

</div>



        <div class="logo"  style="color:white;text-decoration:none;">Amazon </div>
        <div class="search-bar">
            <input 
                type="text"
                id="searchInput"
                placeholder="Search products"
                onkeyup="searchProducts()"
            >
            <div id="suggestions" style="background:white; position:absolute; width:100%; z-index:100; border-radius:5px;"></div>
        </div>
        
        <div class="nav-links">
            <button onclick="toggleDarkMode()" style="background:transparent; font-size:20px; padding:0; border:none; cursor:pointer;">
                🌙
            </button>
            
            <div style="position:relative; cursor:pointer; font-size:20px;" onclick="toggleNotifications()">
                🔔
                <span id="notificationCount" style="background:red; color:white; border-radius:50%; padding:2px 6px; font-size:12px; position:absolute; top:-10px; right:-10px;">
                    3
                </span>
            </div>

            

            <!-- Auth/Cart Links Container -->
            <div id="auth-links" style="display:flex; gap:20px; align-items:center;">
                <!-- renderNavbar() will inject links here -->
            </div>
        </div>
    </div>

    <!-- Notifications Dropdown -->
    <div id="notificationPanel" style="display:none; position:absolute; right:20px; top:80px; background:white; width:300px; padding:15px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2); z-index:1000;">
        <h3>Notifications</h3>
        <hr><br>
        <p>📦 Your order has shipped</p><br>
        <p>🔥 New sale available today</p><br>
        <p>❤️ Wishlist item price dropped</p>
    </div>

    <!-- Loader & Banner -->
    <div id="loader" class="loader"></div>
    <div class="banner"></div>
    
    <!-- Categories -->
    <div class="categories">
        <button onclick="filterCategory('all')">All</button>
        <button onclick="filterCategory('Electronics')">Electronics</button>
        <button onclick="filterCategory('Fashion')">Fashion</button>
        <button onclick="filterCategory('Accessories')">Accessories</button>
    </div>

    <!-- Dynamic Products -->
    <div class="products" id="product-container">
        <!-- Products will be injected here -->
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="modalImage">
            <h2 id="modalName"></h2>
            <p id="modalPrice" class="price"></p>
            <p id="modalCategory"></p>
            <p id="modalRating" class="rating"></p> 
            
            <textarea id="reviewInput" placeholder="Write your review..." style="width:100%; padding:10px; margin-top:15px; height:80px;"></textarea>
            <button onclick="submitReview()" style="margin-top:10px;">Submit Review</button>
            <div id="reviewsContainer" style="margin-top:20px; text-align:left;"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        © 2026 Amazon Clone | DevOps Project
    </footer>

    <!-- JavaScript -->
    <script>
        let currentProduct = "";
        let allProducts = [];

        // Initialize Page
        renderNavbar();


       

                /* Add to Cart */
        function addToCart(productName, productPrice, productImage) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let existingProduct = cart.find(item => item.name === productName);

            if (existingProduct) {
                existingProduct.quantity += 1;
            } else {
                cart.push({
                    name: productName,
                    price: productPrice,
                    image: productImage,
                    quantity: 1
                });
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            alert(productName + " added to cart!");
        }

        /* Buy Now */
        function buyNow(name, price, image) {
            let instantOrder = [{
                name: name,
                price: price,
                image: image,
                quantity: 1
            }];
            localStorage.setItem("cart", JSON.stringify(instantOrder));
            window.location.href = "payment.html";
        }

        /* Add to Wishlist */
        function addToWishlist(productName, productPrice, productImage) {
            let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
            wishlist.push({
                name: productName,
                price: productPrice,
                image: productImage
            });
            localStorage.setItem("wishlist", JSON.stringify(wishlist));
            alert(productName + " added to wishlist ❤️!");
        }

        /* Fetch Products */
        fetch('http://localhost:5000/products')
            .then(response => response.json())
            .then(data => {
                allProducts = data;
                renderProducts(data);
                document.getElementById("loader").style.display = "none";
            })
            .catch(error => {
                console.error("Error fetching products:", error);
                document.getElementById("loader").style.display = "none";
                document.getElementById('product-container').innerHTML =
                "<p style='text-align:center;width:100%;'>Error loading products. Ensure backend is running.</p>";
            });

        /* Render Products */
        function renderProducts(products) {
            let container = document.getElementById('product-container');
            let productsHTML = '';

            products.forEach(product => {
                productsHTML += `
                <div class="card" onclick="showProductDetails('${product.name}', '${product.price}', '${product.image}', '${product.category}', '${product.rating}')">
                    <img src="${product.image}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <div class="price">${product.price}</div>
                    <div class="rating">⭐ ${product.rating}</div>
                    
                    <div class="card-buttons">
                        <button onclick="event.stopPropagation(); addToCart('${product.name}', '${product.price}', '${product.image}')">
                            Add to Cart
                        </button>
                        <button onclick="event.stopPropagation(); buyNow('${product.name}', '${product.price}', '${product.image}')">
                            Buy Now
                        </button>
                        <button onclick="event.stopPropagation(); addToWishlist('${product.name}', '${product.price}', '${product.image}')">
                            ❤️
                        </button>
                    </div>
                </div>
                `;
            });

            container.innerHTML = productsHTML;
        }

        /* Search Products */
        function searchProducts() {
            let searchValue = document.getElementById("searchInput").value.toLowerCase();
            let filteredProducts = allProducts.filter(product =>
                product.name.toLowerCase().includes(searchValue)
            );

            renderProducts(filteredProducts);

            let suggestions = document.getElementById("suggestions");
            suggestions.innerHTML = "";

            if (searchValue === "") return;

            filteredProducts.forEach(product => {
                suggestions.innerHTML += `
                <div class="suggestion-item" onclick="selectSuggestion('${product.name}')">
                    ${product.name}
                </div>
                `;
            });
        }

        /* Select Suggestion */
        function selectSuggestion(productName) {
            document.getElementById("searchInput").value = productName;
            document.getElementById("suggestions").innerHTML = "";

            let filteredProducts = allProducts.filter(product => product.name === productName);
            renderProducts(filteredProducts);
        }

        /* Filter Categories */
        function filterCategory(category) {
            if (category === 'all') {
                renderProducts(allProducts);
            } else {
                let filteredProducts = allProducts.filter(product => product.category === category);
                renderProducts(filteredProducts);
            }
        }

        /* Modal Functions */
        function showProductDetails(name, price, image, category, rating) {
            // FIX: currentProduct needs to just be the string name for the reviews key to work properly
            currentProduct = name; 
            document.getElementById("modalName").innerText = name;
            document.getElementById("modalPrice").innerText = "Price: " + price;
            document.getElementById("modalCategory").innerText = "Category: " + category;
            document.getElementById("modalRating").innerText = "Rating: ⭐ " + rating;
            document.getElementById("modalImage").src = image;
            
            loadReviews();
            document.getElementById("productModal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("productModal").style.display = "none";
        }

        window.onclick = function(event) {
            let modal = document.getElementById("productModal");
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        /* Reviews */
        function submitReview() {
            let reviewText = document.getElementById("reviewInput").value;

            if (reviewText.trim() === "") {
                alert("Please write a review");
                return;
            }

            let reviews = JSON.parse(localStorage.getItem("reviews")) || {};

            if (!reviews[currentProduct]) {
                reviews[currentProduct] = [];
            }

            reviews[currentProduct].push(reviewText);
            localStorage.setItem("reviews", JSON.stringify(reviews));

            document.getElementById("reviewInput").value = "";
            loadReviews();
        }

        function loadReviews() {
            let reviews = JSON.parse(localStorage.getItem("reviews")) || {};
            let container = document.getElementById("reviewsContainer");
            container.innerHTML = "";

            let productReviews = reviews[currentProduct] || [];

            if (productReviews.length === 0) {
                container.innerHTML = "<p>No reviews yet</p>";
                return;
            }

            productReviews.forEach(review => {
                // Determine text color based on dark mode so text isn't invisible
                let isDarkMode = document.body.classList.contains('dark-mode');
                let textColor = isDarkMode ? "black" : "black"; 

                container.innerHTML += `
                <div style="background:#f3f3f3; color:${textColor}; padding:10px; margin-top:10px; border-radius:5px;">
                    <div style="color:#ff9900;">⭐⭐⭐⭐⭐</div>
                    <p style="margin-top:5px;">${review}</p>
                </div>
                `;
            });
        }

        /* UI Toggles */
        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
            loadReviews(); // Refresh review colors
        }

        function toggleNotifications() {
            let panel = document.getElementById("notificationPanel");
            panel.style.display = (panel.style.display === "block") ? "none" : "block";
        }

        function renderNavbar() {
            // FIX: Render into auth-links specifically so we don't overwrite the Dark Mode/Notifications icons
            let nav = document.getElementById("auth-links"); 
            let loggedIn = localStorage.getItem("loggedIn");

            if (loggedIn === "true") {
                nav.innerHTML = `
                <div><a href="profile.html" style="color:white;text-decoration:none;">Profile 👤</a></div>
                <div><a href="orders.html" style="color:white;text-decoration:none;">Orders</a></div>
                <div><a href="wishlist.html" style="color:white;text-decoration:none;">Wishlist ❤️</a></div>
                <div><a href="cart.html" style="color:white;text-decoration:none;">Cart 🛒</a></div>
                `;
            } else {
                nav.innerHTML = `
                <div><a href="login.html" style="color:white;text-decoration:none;">Login</a></div>
                `;
            }
        }
    </script>

</body>
</html>
