<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<style>

body{
    font-family:Arial;
    background:#f3f3f3;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.profile-box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:20px;
}

h2{
    margin-bottom:10px;
}

button{
    background:#ff9900;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
    margin-top:20px;
}

button:hover{
    background:#e68a00;
}

</style>
</head>

<body>

<div class="profile-box">

    <img src="https://randomuser.me/api/portraits/women/44.jpg">

    <h2>Reshma K</h2>

    <p>reshma@email.com</p>

    <button onclick="logout()">
        Logout
    </button>

</div>

<script>

function logout(){

    localStorage.removeItem("loggedIn");

    alert("Logged Out Successfully!");

    window.location.href = "index.html";
}

</script>

</body>
</html>
